name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build · ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: impforge-cli-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: impforge-cli-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: impforge-cli-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: impforge-cli-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: build release
        run: cargo build --release --locked --bin impforge-cli --target ${{ matrix.target }}

      - name: package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/impforge-cli ${{ matrix.asset }}
          sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256

      - name: package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          copy target\${{ matrix.target }}\release\impforge-cli.exe ${{ matrix.asset }}
          (Get-FileHash ${{ matrix.asset }}).Hash.ToLower() + "  ${{ matrix.asset }}" | Out-File ${{ matrix.asset }}.sha256

      - name: upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            impforge-cli-linux-x86_64/*
            impforge-cli-macos-arm64/*
            impforge-cli-macos-x86_64/*
            impforge-cli-windows-x86_64.exe/*
